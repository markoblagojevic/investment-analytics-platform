services:
  mysql:
    image: mysql:8.4
    container_name: investment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: investment_analytics
    ports:
      - "3307:3306"
    volumes:
      - investment_mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: investment-redis
    ports:
      - "6379:6379"

volumes:
  investment_mysql_data: